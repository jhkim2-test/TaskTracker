<!DOCTYPE html>

<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Tracker</title>
  <link rel="stylesheet" href="file:///C:/Users/JHKIM2/Downloads/index_files/tabler-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f4;
      --bg-tertiary: #f0efea;
      --text-primary: #1a1a19;
      --text-secondary: #6b6b68;
      --text-tertiary: #9b9b97;
      --border-light: rgba(0,0,0,0.10);
      --border-mid: rgba(0,0,0,0.18);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2e2e2b;
        --text-primary: #f0efea;
        --text-secondary: #a8a8a4;
        --text-tertiary: #6b6b68;
        --border-light: rgba(255,255,255,0.10);
        --border-mid: rgba(255,255,255,0.18);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Lock ── */
    .lock-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-tertiary); }
    .lock-card { background:var(--bg-primary); border:0.5px solid var(--border-light); border-radius:var(--radius-lg); padding:2rem 2rem 1.75rem; width:100%; max-width:360px; }
    .lock-icon { width:44px; height:44px; border-radius:50%; background:var(--bg-secondary); display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--text-secondary); margin-bottom:1.25rem; }
    .lock-title { font-size:17px; font-weight:500; color:var(--text-primary); margin-bottom:4px; }
    .lock-sub { font-size:13px; color:var(--text-secondary); margin-bottom:1.5rem; }
    .lock-input { width:100%; font-family:inherit; font-size:14px; padding:9px 12px; border-radius:var(--radius-md); border:0.5px solid var(--border-mid); background:var(--bg-primary); color:var(--text-primary); margin-bottom:10px; }
    .lock-input:focus { outline:none; border-color:#378ADD; }
    .lock-btn { width:100%; padding:9px; border-radius:var(--radius-md); border:none; background:var(--text-primary); color:var(--bg-primary); font-family:inherit; font-size:14px; font-weight:500; cursor:pointer; margin-bottom:10px; }
    .lock-btn:hover { opacity:0.85; }
    .lock-error { font-size:12px; color:#A32D2D; display:none; margin-bottom:8px; }
    .lock-hint { font-size:11px; color:var(--text-tertiary); text-align:center; margin-top:4px; }

    /* ── Topbar ── */
    .topbar { background:var(--bg-primary); border-bottom:0.5px solid var(--border-light); padding:0 1.5rem; height:52px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
    .topbar-logo { font-size:15px; font-weight:500; color:var(--text-primary); display:flex; align-items:center; gap:8px; }
    .topbar-logo i { font-size:18px; }

    .container { max-width:1440px; margin:0 auto; padding:1.2rem 1.2rem; }

    /* ── Tabs / Buttons ── */
    .tabs { display:flex; gap:3px; background:var(--bg-secondary); border-radius:var(--radius-md); padding:3px; }
    .tab { padding:5px 14px; border-radius:6px; font-size:13px; cursor:pointer; border:none; background:transparent; color:var(--text-secondary); font-family:inherit; transition:all 0.15s; display:flex; align-items:center; gap:5px; }
    .tab.active { background:var(--bg-primary); color:var(--text-primary); font-weight:500; border:0.5px solid var(--border-light); }

    .btn { padding:6px 14px; border-radius:var(--radius-md); border:0.5px solid var(--border-mid); background:var(--bg-primary); color:var(--text-primary); font-size:13px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; transition:background 0.1s; }
    .btn:hover { background:var(--bg-secondary); }
    .btn-primary { background:var(--text-primary); color:var(--bg-primary); border-color:transparent; }
    .btn-primary:hover { opacity:0.85; background:var(--text-primary); }
    .btn-sm { padding:3px 9px; font-size:12px; }

    /* ── Stats ── */
    .summary-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:1.25rem; }
    @media (max-width:640px) { .summary-row { grid-template-columns:repeat(2,1fr); } }
    .stat-card { background:var(--bg-primary); border:0.5px solid var(--border-light); border-radius:var(--radius-md); padding:12px 14px; }
    .stat-label { font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
    .stat-val { font-size:22px; font-weight:500; color:var(--text-primary); }

    /* ── Filter bar ── */
    .filter-bar { display:flex; gap:8px; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
    .filter-bar input, .filter-bar select { font-family:inherit; font-size:13px; padding:6px 10px; border-radius:var(--radius-md); border:0.5px solid var(--border-mid); background:var(--bg-primary); color:var(--text-primary); }
    .filter-bar input { flex:1; min-width:160px; }

    /* ── View toggle ── */
    .view { display:none; }
    .view.active { display:block; }

    /* ── Kanban board ── */
    .kanban { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; align-items:stretch; }
    @media (max-width:768px) { .kanban { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:480px) { .kanban { grid-template-columns:1fr; } }

    .kanban > div {
      background: var(--bg-secondary);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 12px 10px 14px;
      display: flex;
      flex-direction: column;
    }

    .col-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; flex-shrink:0; }
    .col-title { font-size:12px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.05em; }
    .col-count { font-size:11px; background:var(--bg-secondary); color:var(--text-tertiary); border-radius:10px; padding:1px 7px; }
    .col-body { display:flex; flex-direction:column; gap:8px; max-height:560px; overflow-y:auto; padding-right:4px; }
    .col-body::-webkit-scrollbar { width:4px; }
    .col-body::-webkit-scrollbar-track { background:transparent; }
    .col-body::-webkit-scrollbar-thumb { background:var(--border-mid); border-radius:4px; }

    /* ── Task card ── */
    .task-card {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .task-card:hover { border-color: var(--border-mid); }

    /* D-day urgency colours — 더 진한 빨간색 */
    .task-card.urgent-d7  { background:#FFF5DC; border-color:#E8A020; border-width:1px; }
    .task-card.urgent-d3  { background:#FFE4E4; border-color:#D94040; border-width:1.5px; }
    .task-card.urgent-day { background:#FFD0D0; border-color:#B81C1C; border-width:2px; }

    /* Card inner layout */
    .task-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    .task-card-badges { display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0; }
    .task-title { font-size:15.5px; font-weight:500; color:var(--text-primary); line-height:1.4; }
    .task-bottom { display:flex; align-items:center; justify-content:flex-start; min-height:0; }

    /* ── Priority badges ── */
    .priority { font-size:11.9px; padding:2px 7px; border-radius:10px; font-weight:500; white-space:nowrap; }
    .p-high { background:#FCEBEB; color:#A32D2D; }
    .p-mid  { background:#FAEEDA; color:#854F0B; }
    .p-low  { background:#EAF3DE; color:#3B6D11; }

    /* ── Level badge — 색상별 구분 (1=초록, 2=파랑, 3=노랑, 4=빨강, 5=보라) ── */
    .lv-badge { font-size:10.8px; padding:2px 6px; border-radius:10px; font-weight:500; white-space:nowrap; }
    .lv-1 { background:#EAF3DE; color:#3B6D11; }
    .lv-2 { background:#E6F1FB; color:#185FA5; }
    .lv-3 { background:#FFFACC; color:#7A6200; }
    .lv-4 { background:#FCEBEB; color:#A32D2D; }
    .lv-5 { background:#F3E8FB; color:#6B21A8; }

    /* ── Due label ── */
    .due-label { font-size:11px; color:var(--text-tertiary); }
    .due-label.overdue { display:inline-block; background:#C0392B; color:#fff; font-weight:700; padding:2px 7px; border-radius:10px; }
    .due-label.d-day   { display:inline-block; background:#C0392B; color:#fff; font-weight:700; padding:2px 7px; border-radius:10px; }
    .due-label.d3      { display:inline-block; background:#E74C3C; color:#fff; font-weight:600; padding:2px 7px; border-radius:10px; }
    .due-label.d7      { display:inline-block; background:#E67E22; color:#fff; font-weight:500; padding:2px 7px; border-radius:10px; }

    /* ── Avatar ── */
    .avatar { width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:600; flex-shrink:0; }

    /* ── List table ── */
    .list-table { width:100%; border-collapse:collapse; background:var(--bg-primary); border-radius:var(--radius-lg); overflow:hidden; border:0.5px solid var(--border-light); }
    .list-table th { font-size:12px; font-weight:500; color:var(--text-secondary); text-align:left; padding:10px 12px; border-bottom:0.5px solid var(--border-light); white-space:nowrap; }
    .list-table td { font-size:13px; padding:10px 12px; border-bottom:0.5px solid var(--border-light); color:var(--text-primary); vertical-align:middle; }
    .list-table tr:last-child td { border-bottom:none; }
    .list-table tbody tr:hover td { background:var(--bg-secondary); }

    /* ── Status badge ── */
    .status-badge { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:500; white-space:nowrap; }
    .s-todo       { background:var(--bg-secondary); color:var(--text-secondary); }
    .s-inprogress { background:#E6F1FB; color:#185FA5; }
    .s-wait       { background:#FAEEDA; color:#854F0B; }
    .s-done       { background:#EAF3DE; color:#3B6D11; }

    .empty-col { font-size:12px; color:var(--text-tertiary); text-align:center; padding:1.5rem 0; }

    /* ── List view Excel download btn ── */
    .list-header { display:flex; align-items:center; justify-content:flex-end; margin-bottom:8px; }

    /* ══════════════════════════════════════
       MODALS
    ══════════════════════════════════════ */
    .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:200; align-items:center; justify-content:center; padding:1rem; }
    .modal-bg.open { display:flex; }

    /* ── Create modal (standard width) ── */
    .modal {
      background:var(--bg-primary);
      border-radius:var(--radius-lg);
      border:0.5px solid var(--border-light);
      padding:1.25rem 1.5rem 1.5rem;
      width:100%;
      max-width:460px;
      max-height:90vh;
      overflow-y:auto;
    }

    /* ── Edit modal (wider, 2-panel) ── */
    .modal-edit {
      background:var(--bg-primary);
      border-radius:var(--radius-lg);
      border:0.5px solid var(--border-light);
      width:90vw;
      max-width:700px;
      height:78vh;
      max-height:700px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .modal-edit-body {
      display:flex;
      flex:1;
      overflow:hidden;
    }

    /* Main pane */
    .modal-edit-main {
      flex:1;
      padding:1.25rem 1.5rem 1.5rem;
      display:flex;
      flex-direction:column;
      overflow-y:auto;
    }

    /* Settings slide panel */
    .modal-edit-panel {
      width:0;
      overflow:hidden;
      border-left:0.5px solid var(--border-light);
      transition:width 0.22s ease;
      flex-shrink:0;
      background:var(--bg-secondary);
    }
    .modal-edit-panel.open {
      width:280px;
    }
    .modal-edit-panel-inner {
      width:280px;
      padding:1.25rem 1rem 1rem;
    }

    /* Modal header row */
    .modal-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:1rem;
    }
    .modal-header h2 { font-size:16px; font-weight:500; color:var(--text-primary); }
    .modal-header-actions { display:flex; align-items:center; gap:6px; }

    /* Status button (pill, click to cycle) */
    .status-pill {
      font-size:12px;
      padding:3px 12px;
      border-radius:20px;
      border:0.5px solid transparent;
      cursor:pointer;
      font-family:inherit;
      font-weight:500;
      white-space:nowrap;
      transition:all 0.1s;
    }
    .status-pill.s-todo       { background:var(--bg-secondary); color:var(--text-secondary); border-color:var(--border-mid); }
    .status-pill.s-inprogress { background:#E6F1FB; color:#185FA5; border-color:#B5D4F4; }
    .status-pill.s-wait       { background:#FAEEDA; color:#854F0B; border-color:#FAC775; }
    .status-pill.s-done       { background:#EAF3DE; color:#3B6D11; border-color:#C0DD97; }

    .gear-btn {
      width:30px; height:30px;
      border-radius:var(--radius-md);
      border:0.5px solid var(--border-mid);
      background:var(--bg-primary);
      color:var(--text-secondary);
      display:flex; align-items:center; justify-content:center;
      font-size:15px;
      cursor:pointer;
      transition:background 0.1s;
      flex-shrink:0;
    }
    .gear-btn:hover { background:var(--bg-secondary); }
    .gear-btn.active { background:var(--bg-tertiary); color:var(--text-primary); }

    /* Fields */
    .field { margin-bottom:12px; }
    .field label { display:block; font-size:12px; color:var(--text-secondary); margin-bottom:4px; }
    .field input, .field select, .field textarea {
      width:100%; font-family:inherit; font-size:13px; padding:7px 10px;
      border-radius:var(--radius-md); border:0.5px solid var(--border-mid);
      background:var(--bg-primary); color:var(--text-primary);
    }
    .field textarea { resize:vertical; }
    .field-note { flex:1; display:flex; flex-direction:column; }
    .field-note textarea { flex:1; min-height:240px; }

    /* Button group (priority / level) */
    .btn-group-row { display:flex; gap:5px; flex-wrap:wrap; }
    .choice-btn {
      font-size:12px; padding:4px 11px; border-radius:20px;
      border:0.5px solid var(--border-mid);
      background:transparent; color:var(--text-secondary);
      cursor:pointer; font-family:inherit; font-weight:500;
      transition:all 0.1s;
    }
    .choice-btn:hover { background:var(--bg-secondary); }
    .choice-btn.sel-high { background:#FCEBEB; color:#A32D2D; border-color:#F7C1C1; }
    .choice-btn.sel-mid  { background:#FAEEDA; color:#854F0B; border-color:#FAC775; }
    .choice-btn.sel-low  { background:#EAF3DE; color:#3B6D11; border-color:#C0DD97; }
    .choice-btn.sel-lv   { background:#E6F1FB; color:#185FA5; border-color:#B5D4F4; }

    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .modal-footer { display:flex; justify-content:space-between; align-items:center; margin-top:1.25rem; }
    .modal-footer-right { display:flex; gap:8px; }

    /* Panel section label */
    .panel-label { font-size:11px; font-weight:500; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.06em; margin-bottom:7px; }

    /* ══════════════════════════════════════
       PROJECT VIEW
    ══════════════════════════════════════ */
    .section-title { font-size:13px; font-weight:500; color:var(--text-secondary); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.05em; }
    .project-list { display:flex; flex-direction:column; gap:8px; margin-bottom:1.5rem; }

    .project-item {
      background:var(--bg-primary);
      border:0.5px solid var(--border-light);
      border-radius:var(--radius-md);
      overflow:hidden;
    }
    .project-item-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 14px;
      cursor:pointer;
      user-select:none;
    }
    .project-item-header:hover { background:var(--bg-secondary); }
    .project-item-left { display:flex; align-items:center; gap:8px; }
    .project-chevron { font-size:11px; color:var(--text-tertiary); transition:transform 0.18s; display:inline-block; }
    .project-item.expanded .project-chevron { transform:rotate(90deg); }
    .project-item-name { font-size:14px; font-weight:500; color:var(--text-primary); }
    .project-item-count { font-size:12px; color:var(--text-tertiary); }
    .project-item-actions { display:flex; align-items:center; gap:6px; }

    /* Expandable task list inside project */
    .project-task-list { display:none; border-top:0.5px solid var(--border-light); }
    .project-item.expanded .project-task-list { display:block; }
    .project-task-row {
      display:flex; align-items:center; gap:10px;
      padding:8px 14px;
      border-bottom:0.5px solid var(--border-light);
      font-size:13px;
      cursor:pointer;
    }
    .project-task-row:last-child { border-bottom:none; }
    .project-task-row:hover { background:var(--bg-secondary); }
    .project-task-title { flex:1; font-weight:500; color:var(--text-primary); }
    .project-task-meta { display:flex; align-items:center; gap:6px; }

    .add-project-row { display:flex; gap:8px; }
    .add-project-row input { flex:1; font-family:inherit; font-size:13px; padding:7px 10px; border-radius:var(--radius-md); border:0.5px solid var(--border-mid); background:var(--bg-primary); color:var(--text-primary); }

    /* ── Weather Widget ── */
    .weather-widget {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: var(--bg-secondary);
      border: 0.5px solid var(--border-light);
      border-radius: var(--radius-md);
      font-size: 13px;
      color: var(--text-secondary);
      cursor: default;
      user-select: none;
    }
    .weather-widget .weather-temp {
      font-weight: 600;
      color: var(--text-primary);
      font-size: 14px;
    }
    .weather-widget .weather-desc {
      font-size: 12px;
      color: var(--text-tertiary);
    }
  </style>
</head>
<body>

<!-- ── Lock screen ── -->
<div class="lock-screen" id="lock-screen">
  <div class="lock-card">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">Task Tracker</div>
    <div class="lock-sub">초대받은 분만 입장할 수 있어요.</div>
    <input class="lock-input" type="password" id="lock-input" placeholder="비밀번호 입력" onkeydown="if(event.key===&#39;Enter&#39;)tryUnlock()">
    <div class="lock-error" id="lock-error">비밀번호가 올바르지 않아요.</div>
    <button class="lock-btn" onclick="tryUnlock()">입장하기</button>
    <div class="lock-hint">팀 초대 비밀번호를 입력해 주세요</div>
  </div>
</div>

<div id="main-app" style="display:none;">

<!-- ── Topbar ── -->
<div class="topbar">
  <div class="topbar-logo">
    🗂️ Task Tracker
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <!-- 날씨 위젯 -->
    <div class="weather-widget" id="weather-widget" title="인천 현재 날씨">
      <span id="weather-icon">☁️</span>
      <span class="weather-temp" id="weather-temp">26°C</span>
      <span class="weather-desc" id="weather-desc">흐림</span>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab(&#39;kanban&#39;,this)">📋 보드</button>
      <button class="tab" onclick="switchTab(&#39;list&#39;,this)">📄 목록</button>
      <button class="tab" onclick="switchTab(&#39;projects&#39;,this)">📁 프로젝트</button>
      <button class="tab" onclick="openMemoModal()">📝 메모장</button>
    </div>
    <button class="btn btn-primary" onclick="openCreateModal()">＋ 태스크</button>
  </div>
</div>

<div class="container">

  <!-- Stats -->
  <div class="summary-row">
    <div class="stat-card"><div class="stat-label">전체 태스크</div><div class="stat-val" id="st-total">0</div></div>
    <div class="stat-card"><div class="stat-label">진행 중</div><div class="stat-val" id="st-inprogress" style="color:#185FA5;">0</div></div>
    <div class="stat-card"><div class="stat-label">기한 임박 (3일)</div><div class="stat-val" id="st-due" style="color:#854F0B;">0</div></div>
    <div class="stat-card"><div class="stat-label">완료</div><div class="stat-val" id="st-done" style="color:#3B6D11;">0</div></div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <input type="text" id="search-input" placeholder="태스크 검색..." oninput="renderAll()">

<script>
/* ══════════════════════════════════════
   DATA & PERSISTENCE
══════════════════════════════════════ */
const MEMBER_COLORS   = { '나':{ bg:'#E6F1FB', text:'#185FA5' }, '팀원 A':{ bg:'#EAF3DE', text:'#3B6D11' }, '팀원 B':{ bg:'#FAEEDA', text:'#854F0B' } };
const MEMBER_INITIALS = { '나':'나', '팀원 A':'A', '팀원 B':'B' };
const PRI_ORDER       = { high:0, mid:1, low:2 };
const STATUS_CYCLE    = ['todo','inprogress','wait','done'];
const STATUS_LABELS   = { todo:'할 일', inprogress:'진행 중', wait:'대기', done:'완료' };
const STATUS_CLASS    = { todo:'s-todo', inprogress:'s-inprogress', wait:'s-wait', done:'s-done' };

let tasks = [], projects = [], editId = null;
let cStatusVal = 'todo', eStatusVal = 'todo';

function load() {
  try { tasks    = JSON.parse(localStorage.getItem('ws_tasks')    || '[]'); } catch(e) { tasks = []; }
  try { projects = JSON.parse(localStorage.getItem('ws_projects') || '["웹 리디자인","앱 개발","마케팅","기타"]'); } catch(e) { projects = []; }
  /* migrate old 'review' → 'wait' */
  tasks.forEach(t => { if (t.status === 'review') t.status = 'wait'; });
}
function persist() {
  localStorage.setItem('ws_tasks',    JSON.stringify(tasks));
  localStorage.setItem('ws_projects', JSON.stringify(projects));
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function daysUntil(d) {
  if (!d) return null;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const due = new Date(d + 'T00:00:00');
  return Math.round((due - today) / 86400000);
}

/* ══════════════════════════════════════
   FILTERING & SORTING
══════════════════════════════════════ */
function getFiltered() {
  const q    = document.getElementById('search-input').value.toLowerCase();
  const proj = document.getElementById('filter-project').value;
  const ass  = document.getElementById('filter-assignee').value;
  const pri  = document.getElementById('filter-priority').value;
  return tasks
    .filter(t =>
      (!q    || t.title.toLowerCase().includes(q) || (t.project||'').toLowerCase().includes(q)) &&
      (!proj || t.project  === proj) &&
      (!ass  || t.assignee === ass)  &&
      (!pri  || t.priority === pri)
    )
    .sort((a,b) => (PRI_ORDER[a.priority]??1) - (PRI_ORDER[b.priority]??1));
}

/* ══════════════════════════════════════
   HTML HELPERS
══════════════════════════════════════ */
function avatarHtml(name) {
  if (!name) return '';
  const c = MEMBER_COLORS[name] || { bg:'#F1EFE8', text:'#5F5E5A' };
  const i = MEMBER_INITIALS[name] || name[0];
  return `<div class="avatar" style="background:${c.bg};color:${c.text};">${i}</div>`;
}
function priorityHtml(p) {
  return { high:`<span class="priority p-high">높음</span>`, mid:`<span class="priority p-mid">보통</span>`, low:`<span class="priority p-low">낮음</span>` }[p] || '';
}
function levelHtml(lv) {
  if (!lv) return '';
  const cls = ['lv-1','lv-2','lv-3','lv-4','lv-5'][parseInt(lv)-1] || 'lv-1';
  return `<span class="lv-badge ${cls}">Lv.${lv}</span>`;
}
function statusHtml(s) {
  const cls = STATUS_CLASS[s] || 's-todo';
  return `<span class="status-badge ${cls}">${STATUS_LABELS[s]||s}</span>`;
}

/* D-day label for kanban card */
function cardDueHtml(d, isDone) {
  if (isDone || !d) return '';
  const days = daysUntil(d);
  if (days === null) return '';
  let cls = 'due-label', label = '';
  if (days < 0)       { cls += ' overdue'; label = `D+${Math.abs(days)}`; }
  else if (days === 0){ cls += ' d-day';   label = 'D-Day'; }
  else if (days <= 3) { cls += ' d3';      label = `D-${days}`; }
  else if (days <= 7) { cls += ' d7';      label = `D-${days}`; }
  else                { label = `D-${days}`; }
  return `<span class="${cls}">${label}</span>`;
}

/* Card urgency CSS class */
function cardUrgencyClass(d, isDone) {
  if (isDone || !d) return '';
  const days = daysUntil(d);
  if (days === null) return '';
  if (days === 0 || days < 0) return 'urgent-day';
  if (days <= 3)  return 'urgent-d3';
  if (days <= 7)  return 'urgent-d7';
  return '';
}

/* Due label for list view */
function listDueHtml(d) {
  if (!d) return '-';
  const days = daysUntil(d);
  let cls = 'due-label', label = '';
  if (days < 0)       { cls += ' overdue'; label = `D+${Math.abs(days)}`; }
  else if (days === 0){ cls += ' d-day';   label = 'D-Day'; }
  else if (days <= 3) { cls += ' d3';      label = `D-${days}`; }
  else if (days <= 7) { cls += ' d7';      label = `D-${days}`; }
  else                { label = `D-${days}`; }
  return `<span class="${cls}">${label}</span>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function renderStats() {
  document.getElementById('st-total').textContent      = tasks.length;
  document.getElementById('st-inprogress').textContent = tasks.filter(t => t.status === 'inprogress').length;
  document.getElementById('st-done').textContent       = tasks.filter(t => t.status === 'done').length;
  const soon = tasks.filter(t => { const d = daysUntil(t.due); return d !== null && d >= 0 && d <= 3 && t.status !== 'done'; });
  document.getElementById('st-due').textContent = soon.length;
}

function sortTasks(arr) {
  const PRIORITY_ORDER = { high: 0, mid: 1, low: 2 };
  return [...arr].sort((a, b) => {
    const aDays = a.due ? daysUntil(a.due) : null;
    const bDays = b.due ? daysUntil(b.due) : null;
    // 마감기한 없는 태스크는 맨 아래
    if (aDays === null && bDays === null) {
      return (PRIORITY_ORDER[a.priority] ?? 1) - (PRIORITY_ORDER[b.priority] ?? 1);
    }
    if (aDays === null) return 1;
    if (bDays === null) return -1;
    // 마감기한 임박 순 (작을수록 앞)
    if (aDays !== bDays) return aDays - bDays;
    // 같은 날이면 우선순위 높음 먼저
    return (PRIORITY_ORDER[a.priority] ?? 1) - (PRIORITY_ORDER[b.priority] ?? 1);
  });
}

function renderKanban() {
  const cols = { todo:[], inprogress:[], wait:[], done:[] };
  getFiltered().forEach(t => { if (cols[t.status]) cols[t.status].push(t); });
  Object.entries(cols).forEach(([status, arr]) => {
    const sorted = sortTasks(arr);
    document.getElementById('cnt-' + status).textContent = sorted.length;
    const el = document.getElementById('col-' + status);
    if (!sorted.length) { el.innerHTML = '<div class="empty-col">없음</div>'; return; }
    el.innerHTML = sorted.map(t => {
      const isDone   = t.status === 'done';
      const urgency  = cardUrgencyClass(t.due, isDone);
      const dueHtml  = cardDueHtml(t.due, isDone);
      return `
        <div class="task-card${urgency?' '+urgency:''}" onclick="openEditModal('${t.id}')">
          <div class="task-card-top">
            <div class="task-title">${escHtml(t.title)}</div>
            <div class="task-card-badges">
              ${avatarHtml(t.assignee)}
              ${priorityHtml(t.priority)}
              ${levelHtml(t.level)}
            </div>
          </div>
          <div class="task-bottom">
            ${dueHtml}
          </div>
        </div>`;
    }).join('');
  });
}

function renderList() {
  const body = document.getElementById('list-body');
  const arr  = getFiltered();
  if (!arr.length) {
    body.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text-tertiary);padding:2rem;">태스크가 없습니다</td></tr>';
    return;
  }
  body.innerHTML = arr.map(t => `
    <tr>
      <td style="font-weight:500;">${escHtml(t.title)}</td>
      <td style="color:var(--text-secondary);">${escHtml(t.project||'-')}</td>
      <td>${t.assignee ? `<div style="display:flex;align-items:center;gap:6px;">${avatarHtml(t.assignee)}<span>${escHtml(t.assignee)}</span></div>` : '-'}</td>
      <td>${priorityHtml(t.priority)}</td>
      <td>${levelHtml(t.level)||'-'}</td>
      <td>${listDueHtml(t.due)}</td>
      <td>${statusHtml(t.status)}</td>
      <td><button class="btn btn-sm" onclick="openEditModal('${t.id}')">✏️</button></td>
    </tr>`).join('');
}

function renderProjects() {
  const list = document.getElementById('project-list');
  if (!projects.length) { list.innerHTML = '<div class="empty-col">프로젝트가 없습니다</div>'; return; }
  list.innerHTML = projects.map((p, i) => {
    const ptasks = tasks.filter(t => t.project === p);
    const taskRows = ptasks.length
      ? ptasks.sort((a,b)=>(PRI_ORDER[a.priority]??1)-(PRI_ORDER[b.priority]??1)).map(t => `
          <div class="project-task-row" onclick="openEditModal('${t.id}')">
            <div class="project-task-title">${escHtml(t.title)}</div>
            <div class="project-task-meta">
              ${priorityHtml(t.priority)}
              ${levelHtml(t.level)}
              ${statusHtml(t.status)}
              ${listDueHtml(t.due)}
            </div>
          </div>`).join('')
      : '<div style="padding:10px 14px;font-size:12px;color:var(--text-tertiary);">태스크 없음</div>';
    return `
      <div class="project-item" id="pi-${i}">
        <div class="project-item-header" onclick="toggleProject(${i})">
          <div class="project-item-left">
            <i class="project-chevron" style="font-style:normal;">▶</i>
            <div>
              <div class="project-item-name">${escHtml(p)}</div>
              <div class="project-item-count">태스크 ${ptasks.length}개</div>
            </div>
          </div>
          <div class="project-item-actions" onclick="event.stopPropagation()">
            <button class="btn btn-sm" style="color:#A32D2D;" onclick="deleteProject(${i})">🗑</button>
          </div>
        </div>
        <div class="project-task-list">${taskRows}</div>
      </div>`;
  }).join('');
}

function toggleProject(i) {
  document.getElementById('pi-' + i).classList.toggle('expanded');
}

function updateFilterOptions() {
  const ps  = document.getElementById('filter-project');
  const cur = ps.value;
  ps.innerHTML = '<option value="">모든 프로젝트</option>' + projects.map(p => `<option value="${p}"${cur===p?' selected':''}>${escHtml(p)}</option>`).join('');

  const assignees = [...new Set(tasks.map(t => t.assignee).filter(Boolean))];
  const as  = document.getElementById('filter-assignee');
  const cura = as.value;
  as.innerHTML = '<option value="">모든 담당자</option>' + assignees.map(a => `<option value="${a}"${cura===a?' selected':''}>${escHtml(a)}</option>`).join('');
}

function updateProjectSelects() {
  ['c-project','e-project'].forEach(id => {
    const sel = document.getElementById(id);
    const cur = sel.value;
    sel.innerHTML = '<option value="">선택 안함</option>' + projects.map(p => `<option value="${p}"${cur===p?' selected':''}>${escHtml(p)}</option>`).join('');
  });
}

function renderAll() {
  updateFilterOptions();
  renderStats();
  renderKanban();
  renderList();
  renderProjects();
}

/* ══════════════════════════════════════
   TAB SWITCH
══════════════════════════════════════ */
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t  => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
}

/* ══════════════════════════════════════
   BUTTON-GROUP HELPERS
══════════════════════════════════════ */
function selectPriority(prefix, btn) {
  const grp = document.getElementById(prefix + '-priority-group');
  grp.querySelectorAll('.choice-btn').forEach(b => {
    b.className = 'choice-btn';
  });
  const v = btn.dataset.val;
  btn.classList.add(v === 'high' ? 'sel-high' : v === 'mid' ? 'sel-mid' : 'sel-low');
}

function selectLevel(prefix, btn) {
  const grp = document.getElementById(prefix + '-level-group');
  grp.querySelectorAll('.choice-btn').forEach(b => b.className = 'choice-btn');
  btn.classList.add('sel-lv');
}

function getSelectedPriority(prefix) {
  const grp = document.getElementById(prefix + '-priority-group');
  const sel = grp.querySelector('.choice-btn.sel-high, .choice-btn.sel-mid, .choice-btn.sel-low');
  return sel ? sel.dataset.val : 'mid';
}

function getSelectedLevel(prefix) {
  const grp = document.getElementById(prefix + '-level-group');
  const sel = grp.querySelector('.choice-btn.sel-lv');
  return sel ? sel.dataset.val : '1';
}

function setPriority(prefix, val) {
  const grp = document.getElementById(prefix + '-priority-group');
  grp.querySelectorAll('.choice-btn').forEach(b => {
    b.className = 'choice-btn';
    if (b.dataset.val === val) b.classList.add(val === 'high' ? 'sel-high' : val === 'mid' ? 'sel-mid' : 'sel-low');
  });
}

function setLevel(prefix, val) {
  const grp = document.getElementById(prefix + '-level-group');
  grp.querySelectorAll('.choice-btn').forEach(b => {
    b.className = 'choice-btn';
    if (b.dataset.val === String(val)) b.classList.add('sel-lv');
  });
}

/* ══════════════════════════════════════
   STATUS PILL
══════════════════════════════════════ */
function updateStatusPill(id, val) {
  const pill = document.getElementById(id);
  pill.className = 'status-pill ' + (STATUS_CLASS[val]||'s-todo');
  pill.textContent = STATUS_LABELS[val] || val;
}

function cycleCreateStatus() {
  const idx = STATUS_CYCLE.indexOf(cStatusVal);
  cStatusVal = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  updateStatusPill('c-status-pill', cStatusVal);
}

function cycleEditStatus() {
  const idx = STATUS_CYCLE.indexOf(eStatusVal);
  eStatusVal = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  updateStatusPill('e-status-pill', eStatusVal);
}

/* ══════════════════════════════════════
   CREATE MODAL
══════════════════════════════════════ */
function openCreateModal() {
  updateProjectSelects();
  cStatusVal = 'todo';
  updateStatusPill('c-status-pill', cStatusVal);
  document.getElementById('c-title').value    = '';
  document.getElementById('c-project').value  = '';
  document.getElementById('c-assignee').value = '';
  document.getElementById('c-due').value      = '';
  setPriority('c', 'mid');
  setLevel('c', '1');
  document.getElementById('create-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('c-title').focus(), 50);
}

function closeCreateModal()  { document.getElementById('create-modal-bg').classList.remove('open'); }
function closeCreateModalBg(e) { if (e.target === document.getElementById('create-modal-bg')) closeCreateModal(); }

function saveCreateTask() {
  const title = document.getElementById('c-title').value.trim();
  if (!title) { document.getElementById('c-title').focus(); return; }
  const data = {
    id:        uid(),
    title,
    project:   document.getElementById('c-project').value,
    assignee:  document.getElementById('c-assignee').value,
    priority:  getSelectedPriority('c'),
    level:     getSelectedLevel('c'),
    due:       document.getElementById('c-due').value,
    status:    cStatusVal,
    note:      '',
    createdAt: Date.now()
  };
  tasks.unshift(data);
  persist();
  closeCreateModal();
  renderAll();
}

/* ══════════════════════════════════════
   EDIT MODAL
══════════════════════════════════════ */
function openEditModal(id) {
  editId = id;
  const t = tasks.find(x => x.id === id);
  if (!t) return;

  updateProjectSelects();

  /* header title */
  document.getElementById('e-title-display').textContent = t.title;

  /* status pill */
  eStatusVal = t.status || 'todo';
  updateStatusPill('e-status-pill', eStatusVal);

  /* main fields */
  document.getElementById('e-title').value = t.title;
  document.getElementById('e-due').value   = t.due || '';
  document.getElementById('e-note').value  = t.note || '';

  /* panel fields */
  document.getElementById('e-project').value  = t.project || '';
  document.getElementById('e-assignee').value = t.assignee || '';
  setPriority('e', t.priority || 'mid');
  setLevel('e', t.level || '1');

  document.getElementById('e-delete-btn').style.display = 'flex';

  /* close panel if open */
  document.getElementById('settings-panel').classList.remove('open');
  document.getElementById('gear-btn').classList.remove('active');

  document.getElementById('edit-modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('e-title').focus(), 50);
}

function closeEditModal()  { document.getElementById('edit-modal-bg').classList.remove('open'); }
function closeEditModalBg(e) { if (e.target === document.getElementById('edit-modal-bg')) closeEditModal(); }

  const panel = document.getElementById('settings-panel');
  const btn   = document.getElementById('gear-btn');
  panel.classList.toggle('open');

}

function saveEditTask() {
  const title = document.getElementById('e-title').value.trim();
  if (!title) { document.getElementById('e-title').focus(); return; }
  const orig = tasks.find(t => t.id === editId) || {};
  const data = {
    id:        editId,
    title,
    project:   document.getElementById('e-project').value,
    assignee:  document.getElementById('e-assignee').value,
    priority:  getSelectedPriority('e'),
    level:     getSelectedLevel('e'),
    due:       document.getElementById('e-due').value,
    status:    eStatusVal,
    note:      document.getElementById('e-note').value,
    createdAt: orig.createdAt || Date.now()
  };
  const idx = tasks.findIndex(t => t.id === editId);
  if (idx !== -1) tasks[idx] = data;
  persist();
  closeEditModal();
  renderAll();
}

function deleteEditTask() {
  if (!editId || !confirm('이 태스크를 삭제할까요?')) return;
  tasks = tasks.filter(t => t.id !== editId);
  persist();
  closeEditModal();
  renderAll();
}

/* ══════════════════════════════════════
   PROJECT ACTIONS
══════════════════════════════════════ */
function addProject() {
  const input = document.getElementById('new-project-input');
  const name  = input.value.trim();
  if (!name || projects.includes(name)) return;
  projects.push(name);
  persist();
  input.value = '';
  renderAll();
}

function deleteProject(i) {
  const name = projects[i];
  if (!confirm(`"${name}" 프로젝트를 삭제할까요?\n(태스크는 삭제되지 않습니다)`)) return;
  projects.splice(i, 1);
  persist();
  renderAll();
}

/* ══════════════════════════════════════
   EXCEL DOWNLOAD
══════════════════════════════════════ */
function downloadExcel() {
  const arr = getFiltered();
  const header = ['태스크', '프로젝트', '담당자', '우선순위', '난이도', '마감일', '상태', '업무내용'];
  const priLabel = { high:'높음', mid:'보통', low:'낮음' };
  const rows = arr.map(t => [
    t.title,
    t.project || '',
    t.assignee || '',
    priLabel[t.priority] || t.priority,
    t.level ? 'Lv.' + t.level : '',
    t.due || '',
    STATUS_LABELS[t.status] || t.status,
    (t.note || '').replace(/\n/g,' ')
  ]);

  /* Build CSV with BOM for Excel Korean support */
  const BOM = '\uFEFF';
  const escape = v => `"${String(v).replace(/"/g,'""')}"`;
  const lines  = [header, ...rows].map(r => r.map(escape).join(','));
  const csv    = BOM + lines.join('\r\n');

  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = '태스크_목록.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function dayOffset(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}

const PASSWORD = 'yujin12345!!';

function tryUnlock() {
  const val = document.getElementById('lock-input').value;
  if (val === PASSWORD) {
    sessionStorage.setItem('ws_auth', '1');
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-app').style.display    = 'block';
    load();
    if (!tasks.length) initSample();
    renderAll();
  } else {
    const err = document.getElementById('lock-error');
    err.style.display = 'block';
    document.getElementById('lock-input').value = '';
    document.getElementById('lock-input').focus();
    setTimeout(() => { err.style.display = 'none'; }, 3000);
  }
}

if (sessionStorage.getItem('ws_auth') === '1') {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-app').style.display    = 'block';
  load();
  if (!tasks.length) initSample();
  renderAll();
} else {
  setTimeout(() => document.getElementById('lock-input').focus(), 100);
}

/* ══════════════════════════════════════
   WEATHER WIDGET (Open-Meteo — 무료, API 키 불필요)
   위치: 인천 (위도 37.4563, 경도 126.7052)
══════════════════════════════════════ */
const WEATHER_CODES = {
  0:'☀️',1:'🌤️',2:'⛅',3:'☁️',
  45:'🌫️',48:'🌫️',
  51:'🌦️',53:'🌦️',55:'🌧️',
  61:'🌧️',63:'🌧️',65:'🌧️',
  71:'❄️',73:'❄️',75:'❄️',77:'🌨️',
  80:'🌦️',81:'🌧️',82:'⛈️',
  85:'🌨️',86:'🌨️',
  95:'⛈️',96:'⛈️',99:'⛈️'
};
const WEATHER_DESC = {
  0:'맑음',1:'대체로 맑음',2:'구름 조금',3:'흐림',
  45:'안개',48:'안개',
  51:'이슬비',53:'이슬비',55:'이슬비',
  61:'비',63:'비',65:'강한 비',
  71:'눈',73:'눈',75:'강한 눈',77:'눈날림',
  80:'소나기',81:'소나기',82:'강한 소나기',
  85:'눈 소나기',86:'눈 소나기',
  95:'뇌우',96:'우박 동반 뇌우',99:'우박 동반 뇌우'
};

async function fetchWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=37.4563&longitude=126.7052'
      + '&current=temperature_2m,weathercode'
      + '&timezone=Asia%2FSeoul';
    const res  = await fetch(url);
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weathercode;
    document.getElementById('weather-icon').textContent = WEATHER_CODES[code] ?? '🌡️';
    document.getElementById('weather-temp').textContent = temp + '°C';
    document.getElementById('weather-desc').textContent = WEATHER_DESC[code] ?? '날씨 정보';
  } catch(e) {
    document.getElementById('weather-icon').textContent = '🌡️';
    document.getElementById('weather-temp').textContent = '--°C';
    document.getElementById('weather-desc').textContent = '연결 실패';
  }
}

// 페이지 로드 시 바로 실행, 이후 30분마다 자동 갱신
fetchWeather();
setInterval(fetchWeather, 30 * 60 * 1000);
